<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KickCoin - WinKick</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>💰 KickCoin</h1>
</header>

<div class="hero">

<h2>Il tuo saldo</h2>

<h1 id="saldo">1000 🪙</h1>

<h3>Scegli quanti KickCoin puntare</h3>

<button onclick="punta(10)">10</button>
<button onclick="punta(50)">50</button>
<button onclick="punta(100)">100</button>
<button onclick="punta(500)">500</button>

<br><br>

<a class="btn" href="index.html">⬅ Torna alla Home</a>

</div>

<script src="script.js"></script>
<script>
let saldo = localStorage.getItem("saldo");

if (saldo === null) {
    saldo = 1000;
}

saldo = Number(saldo);

document.getElementById("saldo").innerHTML = saldo + " 🪙";

function punta(importo) {
    if (saldo >= importo) {
        saldo -= importo;
        localStorage.setItem("saldo", saldo);
        document.getElementById("saldo").innerHTML = saldo + " 🪙";
        alert("Hai puntato " + importo + " KickCoin!");
    } else {
        alert("Non hai abbastanza KickCoin!");
    }
}
</script>
</body>
</html>
