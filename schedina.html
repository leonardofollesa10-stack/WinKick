<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crea Schedina - WinKick</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🎟️ Crea la tua schedina</h1>
</header>

<div class="hero">

<h2>Seleziona il pronostico</h2>

<div class="card">
<h3>🇮🇹 Juventus 🆚 Milan</h3>

<p>Quote:</p>

<button onclick="scegli('Juventus',2.10)">1 (2.10)</button>

<button onclick="scegli('Pareggio',3.30)">X (3.30)</button>

<button onclick="scegli('Milan',3.40)">2 (3.40)</button>

</div>

<br>

<p>Pronostico scelto: <span id="scelta">Nessuno</span></p>

<p>Quota: <span id="quota">0</span></p>

<p>Puntata: <input id="puntata" type="number" value="100"></p>

<button class="btn" onclick="calcola()">💰 Calcola vincita</button>

<p id="vincita"></p>

<br>

<div class="card">
<h3>🇪🇸 Barcellona 🆚 Real Madrid</h3>

<button>1</button>
<button>X</button>
<button>2</button>

</div>

<br>

<div class="card">
<h3>🇩🇪 Bayern 🆚 Dortmund</h3>

<button>1</button>
<button>X</button>
<button>2</button>

</div>

<br>

<a class="btn" href="index.html">⬅ Torna alla Home</a>
<br><br>
<button onclick="confermaSchedina()" class="btn">
✅ Conferma Schedina
</button>
</div>

<script src="script.js"></script>
<script>
function confermaSchedina() {
    alert("🎉 Schedina giocata con successo!");
    window.location.href = "kickcoin.html";
}
</script>
</body>
</html>
